<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maricela Monchez | Experiencia personalizada Mary Kay</title>
  <meta name="description" content="Landing premium para agendar una experiencia personalizada de belleza y cuidado de la piel con Maricela Monchez, Consultora de Belleza Independiente Mary Kay.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ["Instrument Serif", "serif"],
            body: ["Barlow", "sans-serif"]
          },
          borderRadius: {
            DEFAULT: "9999px"
          },
          colors: {
            mary: {
              pink: "#E83E9D",
              vivid: "#FF4FAE",
              soft: "#F8B6D8",
              light: "#FCE7F3",
              deep: "#4B0637",
              wine: "#920B62",
              blush: "#FFF3F9",
              gold: "#D7B56D",
              ink: "#24121F",
              muted: "#6F5365"
            }
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --color-bg-dark: #920B62;
      --color-bg-dark-2: #B9147C;
      --color-bg-deep: #4B0637;
      --color-primary: #E83E9D;
      --color-primary-hover: #FF4FAE;
      --color-primary-soft: #F8B6D8;
      --color-blush: #FFF3F9;
      --color-blush-2: #FCE7F3;
      --color-gold: #D7B56D;
      --color-text-dark: #24121F;
      --color-text-soft: #6F5365;
      --color-white: #FFFFFF;
      --glass-bg: rgba(255, 255, 255, 0.10);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glow-pink: rgba(232, 62, 157, 0.38);

      --bg-main: var(--color-blush);
      --bg-soft: var(--color-blush-2);
      --bg-blush: var(--color-blush);
      --dark-main: var(--color-bg-dark);
      --dark-secondary: var(--color-bg-dark-2);
      --dark-deep: var(--color-bg-deep);
      --pink-main: var(--color-primary);
      --pink-vivid: var(--color-primary-hover);
      --pink-soft: var(--color-primary-soft);
      --pink-light: var(--color-blush-2);
      --gold-soft: var(--color-gold);
      --gold-light: #F4DFB0;
      --text-main: var(--color-text-dark);
      --text-muted: var(--color-text-soft);
      --white: var(--color-white);
      --glass: var(--glass-bg);
      --pink-glow: var(--glow-pink);
      --shadow-rose: rgba(232, 62, 157, 0.18);
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 96px;
      background: var(--dark-main);
      width: 100%;
      max-width: 100%;
      height: auto;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      height: auto;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--dark-main);
      color: var(--text-main);
      font-family: "Barlow", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    #root {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .viewport-fill {
      width: 100%;
      max-width: 100%;
      margin-left: 0;
      margin-right: 0;
      position: relative;
      isolation: isolate;
    }

    section {
      width: 100%;
      max-width: 100%;
      scroll-margin-top: 104px;
    }

    #opciones {
      scroll-margin-top: 104px;
    }

    ::selection {
      background: var(--pink-glow);
      color: var(--white);
    }

    .liquid-glass {
      background: var(--glass);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.16), 0 20px 50px rgba(232,62,157,0.12);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: linear-gradient(135deg, var(--pink-main), var(--pink-vivid));
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 0 12px 35px rgba(232,62,157,0.35), inset 0 1px 1px rgba(255,255,255,0.28);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%,
      rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glass-content {
      position: relative;
      z-index: 1;
    }

    .hero-title {
      letter-spacing: -0.04em;
    }

    .cinematic-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: 100%;
      z-index: 0;
      overflow: hidden;
      background: var(--dark-main);
      transform: translateZ(0);
      pointer-events: none;
    }

    .cinematic-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 243, 249, 0.18), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(255, 79, 174, 0.26), transparent 30%),
        linear-gradient(135deg, rgba(214, 27, 140, 0.78) 0%, rgba(232, 62, 157, 0.66) 45%, rgba(255, 79, 174, 0.38) 100%);
      pointer-events: none;
    }

    .bg-photo {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      filter: saturate(0.95) contrast(1.03);
      transform: translateZ(0);
      backface-visibility: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .bg-photo:first-child {
      opacity: 1;
    }

    .bg-soft-blush {
      background: var(--bg-main);
    }

    .soft-section-transition {
      position: relative;
      isolation: isolate;
    }

    .soft-section-transition::before {
      content: "";
      display: none;
    }

    .bg-dark-rose {
      background:
        radial-gradient(circle at 74% 12%, rgba(255, 136, 199, 0.16), transparent 34%),
        linear-gradient(180deg, var(--color-bg-dark-2) 0%, var(--color-bg-dark) 48%, var(--color-bg-deep) 100%);
    }

    .testimonials-photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
      opacity: 0.42;
      filter: saturate(0.9) contrast(1.04);
      pointer-events: none;
    }

    .testimonials-veil {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 10%, rgba(232, 62, 157, 0.22), transparent 38%),
        linear-gradient(180deg, rgba(138, 15, 99, 0.72) 0%, rgba(214, 27, 140, 0.86) 45%, rgba(138, 15, 99, 0.96) 100%);
      pointer-events: none;
    }

    .testimonial-card {
      width: 100%;
      appearance: none;
      border: 0;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .testimonial-card:hover {
      transform: translateY(-3px);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 24px 52px rgba(232, 62, 157, 0.2);
    }

    .testimonial-card:focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 4px;
    }

    .experience-detail-card {
      width: 100%;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
    }

    .experience-detail-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.22), 0 24px 52px rgba(74, 18, 58, 0.2);
    }

    .experience-detail-card:focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 4px;
    }

    .interactive-modal-trigger {
      position: relative;
      isolation: isolate;
    }

    .interactive-modal-trigger::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border: 1px solid transparent;
      border-radius: inherit;
      pointer-events: none;
      transition: border-color 220ms ease, box-shadow 220ms ease;
    }

    .interactive-modal-trigger:hover::after,
    .interactive-modal-trigger:focus-visible::after {
      border-color: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 0 0 1px rgba(248, 182, 216, 0.18);
    }

    .interaction-hint {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 9999px;
      padding: 7px 11px;
      color: rgba(255, 255, 255, 0.94);
      background: rgba(255, 255, 255, 0.1);
      font: 600 11px/1 "Barlow", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.14);
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .interactive-modal-trigger:hover .interaction-hint,
    .interactive-modal-trigger:focus-visible .interaction-hint {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.42);
      transform: translateX(2px);
    }

    .interaction-hint-touch {
      display: none;
    }

    @media (hover: none), (pointer: coarse) {
      .interaction-hint-pointer {
        display: none;
      }

      .interaction-hint-touch {
        display: inline;
      }

      .interactive-modal-trigger {
        animation: interactive-card-pulse 3.8s ease-in-out infinite;
      }

      .interactive-modal-trigger:nth-child(2n) {
        animation-delay: 0.65s;
      }

      .interactive-modal-trigger:nth-child(3n) {
        animation-delay: 1.3s;
      }
    }

    @keyframes interactive-card-pulse {
      0%, 72%, 100% {
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.16), 0 20px 50px rgba(232,62,157,0.12);
      }
      82% {
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.24), 0 20px 52px rgba(248,182,216,0.3), 0 0 0 2px rgba(248,182,216,0.18);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .interactive-modal-trigger {
        animation: none;
      }
    }

    .opportunity-guidance-photo {
      object-position: center 18%;
    }

    @media (min-width: 640px) {
      .opportunity-guidance-photo {
        object-position: center 21%;
      }
    }

    @media (min-width: 1024px) {
      .opportunity-guidance-photo {
        object-position: center 24%;
      }
    }

    .testimonial-overlay {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: grid;
      place-items: center;
      padding: clamp(16px, 3vw, 34px);
      overflow-y: auto;
      background: rgba(138, 15, 99, 0.68);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: testimonial-fade-in 280ms ease both;
    }

    .testimonial-overlay.is-closing {
      animation: testimonial-fade-out 240ms ease both;
    }

    .testimonial-modal {
      position: relative;
      width: min(1120px, 100%);
      height: min(88dvh, 760px);
      max-height: calc(100dvh - clamp(32px, 6vw, 68px));
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: clamp(1.4rem, 3vw, 2.1rem);
      background:
        radial-gradient(circle at 86% 10%, rgba(232, 62, 157, 0.18), transparent 35%),
        rgba(214, 27, 140, 0.92);
      box-shadow: 0 32px 100px rgba(138, 15, 99, 0.38), inset 0 1px 1px rgba(255, 255, 255, 0.2);
      animation: testimonial-modal-in 320ms cubic-bezier(.2,.7,.25,1) both;
    }

    .testimonial-overlay.is-closing .testimonial-modal {
      animation: testimonial-modal-out 240ms ease both;
    }

    .testimonial-modal-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.94fr) minmax(360px, 1.06fr);
      height: 100%;
      min-height: 0;
    }

    .testimonial-modal-photo {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      padding: clamp(14px, 2vw, 20px);
      background: rgba(255, 246, 251, 0.06);
      overflow: hidden;
    }

    .testimonial-modal-photo img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      object-position: center center;
      border-radius: 1.35rem;
      background: rgba(138, 15, 99, 0.3);
    }

    .testimonial-modal-copy {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: clamp(30px, 4.5vw, 52px);
      scrollbar-gutter: stable;
    }

    .identity-modal-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      height: auto;
      min-height: 0;
    }

    .identity-modal-intro,
    .identity-modal-details {
      min-width: 0;
      min-height: 0;
      overflow: visible;
      padding: clamp(34px, 4.5vw, 54px);
    }

    .testimonial-modal:has(.identity-modal-layout) {
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .testimonial-modal:has(.identity-modal-layout)::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .identity-modal-intro {
      display: flex;
      flex-direction: column;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 14%, rgba(248, 182, 216, 0.16), transparent 38%),
        rgba(255, 255, 255, 0.05);
    }

    .opportunity-modal-photo {
      position: relative;
      flex: 0 0 auto;
      height: clamp(190px, 25dvh, 250px);
      margin: 0 0 clamp(22px, 3vw, 30px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 1.25rem;
      background: rgba(255, 246, 251, 0.08);
      box-shadow: 0 18px 42px rgba(42, 11, 36, 0.24);
    }

    .opportunity-modal-photo::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 34%;
      background: linear-gradient(to top, rgba(74, 18, 58, 0.24), transparent);
      pointer-events: none;
    }

    .opportunity-modal-photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--desktop-focus, center 28%);
    }

    .identity-modal-details {
      padding-top: clamp(52px, 5vw, 64px);
    }

    .testimonial-modal-close,
    .testimonial-nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: var(--white);
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .testimonial-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      font-size: 24px;
      line-height: 1;
    }

    .testimonial-modal-close:hover,
    .testimonial-nav-button:not(:disabled):hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.38);
    }

    .testimonial-modal-close:focus-visible,
    .testimonial-nav-button:focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 3px;
    }

    .testimonial-nav-button {
      min-height: 44px;
      border-radius: 9999px;
      gap: 8px;
      padding: 0 16px;
      font: 500 14px "Barlow", sans-serif;
    }

    .testimonial-nav-button:disabled {
      opacity: 0.34;
      cursor: default;
    }

    .testimonial-story.is-next {
      animation: testimonial-slide-next 300ms ease both;
    }

    .testimonial-story.is-prev {
      animation: testimonial-slide-prev 300ms ease both;
    }

    @keyframes testimonial-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes testimonial-fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes testimonial-modal-in {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes testimonial-modal-out {
      from { opacity: 1; transform: scale(1) translateY(0); }
      to { opacity: 0; transform: scale(0.97) translateY(8px); }
    }

    @keyframes testimonial-slide-next {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes testimonial-slide-prev {
      from { opacity: 0; transform: translateX(-16px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 767px) {
      .testimonial-overlay {
        align-items: end;
        padding: 12px;
      }

      .testimonial-modal {
        height: auto;
        max-height: calc(100dvh - 24px);
        overflow-y: auto;
      }

      .testimonial-modal-grid {
        display: flex;
        min-height: auto;
        flex-direction: column;
      }

      .testimonial-modal-photo {
        padding: 12px 12px 0;
      }

      .testimonial-modal-photo img {
        height: min(46svh, 390px);
        object-fit: cover;
        object-position: var(--mobile-focus, center);
      }

      .testimonial-modal-copy {
        overflow: visible;
        padding: 24px 20px 22px;
        scrollbar-gutter: auto;
      }

      .testimonial-modal-close {
        top: 20px;
        right: 20px;
      }

      .identity-modal-layout {
        display: block;
        height: auto;
      }

      .identity-modal-intro,
      .identity-modal-details {
        overflow: visible;
        padding: 28px 20px;
      }

      .identity-modal-intro {
        padding-top: 64px;
      }

      .opportunity-modal-photo {
        height: clamp(210px, 34svh, 320px);
        margin-bottom: 24px;
      }

      .opportunity-modal-photo img {
        object-position: var(--mobile-focus, center 24%);
      }

      .identity-modal-details {
        padding-top: 8px;
        padding-bottom: 24px;
      }
    }

    @media (min-width: 768px) and (max-height: 820px) {
      .testimonial-overlay {
        padding: 16px;
      }

      .testimonial-modal {
        height: calc(100dvh - 32px);
        max-height: 760px;
      }

      .testimonial-modal-copy {
        padding: 34px 38px 26px;
      }

      .testimonial-modal-copy > .mt-4 {
        margin-top: 0.65rem;
      }

      .testimonial-modal-copy > .mt-5 {
        margin-top: 0.85rem;
      }

      .testimonial-modal-copy > .mt-6 {
        margin-top: 1rem;
        gap: 0.65rem;
      }

      .testimonial-modal-copy > .mt-7 {
        margin-top: 1.1rem;
      }
    }

    .hero-shell {
      min-height: 100svh;
      background: linear-gradient(135deg, var(--color-bg-dark-2), var(--color-bg-dark) 52%, var(--color-bg-deep));
    }

    .hero-main {
      min-height: 100svh;
      box-sizing: border-box;
      padding-top: clamp(6rem, 11vh, 7.5rem);
      padding-bottom: clamp(1.75rem, 4vh, 3rem);
    }

    @media (max-height: 760px) {
      .hero-main {
        padding-top: 5.75rem;
        padding-bottom: 1.25rem;
        justify-content: flex-start;
      }

      .hero-title {
        font-size: clamp(2.85rem, 7.3vw, 4.25rem) !important;
        line-height: 0.92 !important;
        letter-spacing: -2px;
        max-width: 45rem;
      }

      .hero-copy {
        margin-top: 1rem !important;
        max-width: 43rem;
      }

      .hero-actions {
        margin-top: 1.15rem !important;
      }

      .hero-stat-grid {
        margin-top: 1.25rem !important;
      }

      .hero-endcap {
        margin-top: 1.35rem !important;
        gap: 0.85rem !important;
      }
    }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(232, 62, 157, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.46);
      color: var(--white);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.18), 0 18px 45px rgba(232, 62, 157, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      line-height: 1;
      white-space: nowrap;

        const updateTheme = () => {
          const navProbeY = 120;
          const lightSections = ["camino"]
            .map((id) => document.getElementById(id))
            .filter(Boolean);
          setOnLight(lightSections.some((section) => {
            const rect = section.getBoundingClientRect();
            return rect.top <= navProbeY && rect.bottom > navProbeY;
          }));
        };

        updateTheme();
        window.addEventListener("scroll", updateTheme, { passive: true });
        window.addEventListener("resize", updateTheme);
        return () => {
          window.removeEventListener("scroll", updateTheme);

        window.addEventListener("resize", closeOnDesktop);

          window.removeEventListener("resize", closeOnDesktop);
